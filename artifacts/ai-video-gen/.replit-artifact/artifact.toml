kind = "web"
previewPath = "/"
title = "AI Video Generator"
version = "1.0.0"
id = "artifacts/ai-video-gen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18452

[services.development]
run = "pnpm --filter @workspace/ai-video-gen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-video-gen", "run", "build" ]
publicDir = "artifacts/ai-video-gen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18452"
BASE_PATH = "/"
